# ----------------------------------------------------------------------
# LALSuite GitLab-CI: build Docker development images for CI pipelines
# ----------------------------------------------------------------------

# -- CI image matrix ---------------------------------------------------

# --- Conda ------------------------------------------------------------

.dev-image-matrix:conda:
  parallel:
    matrix:

      # Conda
      - LCI_PLAT: "conda-py314"
        LCI_PLAT_BASE: "conda"
        LCI_DOCKER_ARGS: "PYTHON_VERSION=3.14.*"

      - LCI_PLAT: "conda-py313"
        LCI_PLAT_BASE: "conda"
        LCI_DOCKER_ARGS: "PYTHON_VERSION=3.13.*"

      - LCI_PLAT: "conda-py312"
        LCI_PLAT_BASE: "conda"
        LCI_DOCKER_ARGS: "PYTHON_VERSION=3.12.*"

      - LCI_PLAT: "conda-py311"
        LCI_PLAT_BASE: "conda"
        LCI_DOCKER_ARGS: "PYTHON_VERSION=3.11.*"

      - LCI_PLAT: "conda-py310"
        LCI_PLAT_BASE: "conda"
        LCI_DOCKER_ARGS: "PYTHON_VERSION=3.10.*"

# --- Other platforms --------------------------------------------------

.dev-image-matrix:other:
  parallel:
    matrix:

      # Enterprise Linux
      - LCI_PLAT: "el8"
        LCI_PLAT_BASE: "el"
        LCI_DOCKER_ARGS: "EL_VERSION=el8"

      # Debian
      - LCI_PLAT: "bookworm"
        LCI_PLAT_BASE: "debian"
        LCI_DOCKER_ARGS: "DEB_VERSION=bookworm"

      - LCI_PLAT: "trixie"
        LCI_PLAT_BASE: "debian"
        LCI_DOCKER_ARGS: "DEB_VERSION=trixie"

      # Ubuntu
      - LCI_PLAT: "noble"
        LCI_PLAT_BASE: "ubuntu"
        LCI_DOCKER_ARGS: "UBU_VERSION=noble"

      # CUDA (Ubuntu)
      - LCI_PLAT: "cuda12.8"
        LCI_PLAT_BASE: "cuda"
        LCI_DOCKER_ARGS: "CUDA_VERSION=12.8.1 UBU_VERSION=noble UBU_VERSION_N=24.04"

      # --- Compilers --------------------------------------------------

      # GCC
      # - when a new GCC version becomes available, increment the version
      #   numbers in LCI_PLAT, GCC_VERSION, and GCC_IMAGE_TAG (except for
      #   GCC_IMAGE_TAG=latest)
      - LCI_PLAT: "gcc-latest"
        LCI_PLAT_BASE: "gcc"
        LCI_DOCKER_ARGS: "GCC_VERSION=16 GCC_IMAGE_TAG=latest DEB_VERSION=trixie"

      - LCI_PLAT: "gcc-15"
        LCI_PLAT_BASE: "gcc"
        LCI_DOCKER_ARGS: "GCC_VERSION=15 GCC_IMAGE_TAG=15-trixie DEB_VERSION=trixie"

      - LCI_PLAT: "gcc-14"
        LCI_PLAT_BASE: "gcc"
        LCI_DOCKER_ARGS: "GCC_VERSION=14 GCC_IMAGE_TAG=14-bookworm DEB_VERSION=bookworm"

      - LCI_PLAT: "gcc-13"
        LCI_PLAT_BASE: "gcc"
        LCI_DOCKER_ARGS: "GCC_VERSION=13 GCC_IMAGE_TAG=13-bookworm DEB_VERSION=bookworm"

      # Clang
      # - when a new Clang version becomes available, increment the version
      #   numbers in LCI_PLAT, CLANG_VERSION, and CLANG_VERSION_ARG (except for
      #   CLANG_VERSION_ARG=latest)
      - LCI_PLAT: "clang-latest"
        LCI_PLAT_BASE: "clang"
        LCI_DOCKER_ARGS: "CLANG_VERSION=22 CLANG_VERSION_ARG=latest DEB_VERSION=bookworm"

      - LCI_PLAT: "clang-21"
        LCI_PLAT_BASE: "clang"
        LCI_DOCKER_ARGS: "CLANG_VERSION=21 CLANG_VERSION_ARG=21 DEB_VERSION=bookworm"

      - LCI_PLAT: "clang-20"
        LCI_PLAT_BASE: "clang"
        LCI_DOCKER_ARGS: "CLANG_VERSION=20 CLANG_VERSION_ARG=20 DEB_VERSION=bookworm"

      - LCI_PLAT: "clang-19"
        LCI_PLAT_BASE: "clang"
        LCI_DOCKER_ARGS: "CLANG_VERSION=19 CLANG_VERSION_ARG=19 DEB_VERSION=bookworm"

# -- CI image jobs -----------------------------------------------------

.dev-image-base-job:
  extends:
    - .linux-job
  variables:
    # push new Docker development image tags here for testing
    TESTING_IMG_PATH: "${CI_REGISTRY_IMAGE}/dev:${LCI_PLAT}-testing"
    # once tested push Docker development image tags here
    FINAL_IMG_PATH: "${CI_REGISTRY_IMAGE}/dev:${LCI_PLAT}"

.dev-image-job:
  stage: .pre
  extends:
    - .dev-image-base-job
    - .docker-build-job
  rules:
    - if: >-
        $LCI_PIPE_TYPE == "sched-devimg"

dev-image:conda:
  extends:
    - .dev-image-job
    - .dev-image-matrix:conda
  script:
    # build Docker images in a temporary directory
    # - all Docker files, and any input files they require, should reside in the
    #   directory .gitlab/ci_images, with the exception of conda-dev-env.yml
    - |
      tmpdir=$(mktemp -d "${LCI_TMPDIR}/dev-image.XXXXXX")
      mv -v conda-dev-env.yml ${tmpdir}/
      mkdir ${tmpdir}/.gitlab/
      mv -v .gitlab/ci_images/ ${tmpdir}/.gitlab/
      cd ${tmpdir}/
    # generate configuration file for docker compose
    - ${LCI_SCRIPTS}/docker_compose_cfg -o compose.yaml
          --file ".gitlab/ci_images/dev_${LCI_PLAT_BASE}.Dockerfile"
          --build-args ${LCI_DOCKER_ARGS} LCI_PKGLIST_X_LALAPPS
          --tags ${TESTING_IMG_PATH}
    # build image
    - ${LCI_SCRIPTS}/retry docker compose build
    # push image to registry
    - docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
    - ${LCI_SCRIPTS}/retry docker compose push -q

dev-image:other:
  extends:
    - .dev-image-job
    - .dev-image-matrix:other
  needs:
    - tarballs:top
  script:
    # build Docker images in a temporary directory
    # - all Docker files, and any input files they require, should reside in the
    #   directory .gitlab/ci_images, with the exception of the LALSuite tarball
    - |
      tmpdir=$(mktemp -d -p ${LCI_TMPDIR})
      TARBALL=$(ls -1 ${CI_PROJECT_DIR}/tarballs/lalsuite-*.tar.*)
      mv -v ${TARBALL} ${tmpdir}/
      export TARBALL_NAME=$(basename ${TARBALL})
      mkdir ${tmpdir}/.gitlab/
      mv -v .gitlab/ci_images/ ${tmpdir}/.gitlab/
      cd ${tmpdir}/
    # generate configuration file for docker compose
    - ${LCI_SCRIPTS}/docker_compose_cfg -o compose.yaml
          --file ".gitlab/ci_images/dev_${LCI_PLAT_BASE}.Dockerfile"
          --build-args ${LCI_DOCKER_ARGS} LCI_PKGLIST_X_LALAPPS TARBALL_NAME
          --tags ${TESTING_IMG_PATH}
    # build image
    - ${LCI_SCRIPTS}/retry docker compose build
    # push image to registry
    - docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
    - ${LCI_SCRIPTS}/retry docker compose push -q

.dev-image-deploy-job:
  extends:
    - .dev-image-base-job
    - .docker-manage-job
    - .deploy-job
  dependencies: []
  script:
    - crane auth login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
    # copy testing image to production image
    - ${LCI_SCRIPTS}/retry crane copy ${TESTING_IMG_PATH} ${FINAL_IMG_PATH}
    # delete testing image
    - ${LCI_SCRIPTS}/retry crane delete ${TESTING_IMG_PATH}
  rules:
    - if: >-
        $LCI_PIPE_TYPE == "sched-devimg"

dev-image:conda:deploy:
  extends:
    - .dev-image-deploy-job
    - .dev-image-matrix:conda

dev-image:other:deploy:
  extends:
    - .dev-image-deploy-job
    - .dev-image-matrix:other
