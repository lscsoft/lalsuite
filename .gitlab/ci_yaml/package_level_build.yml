# -- package upgrade job -----------------------------------------------

upgrade:
  stage: package-level
  image: "${LCI_DEV_IMG}:dev-${LCI_PLAT}${LCI_DEV_TAG_SUFFIX}"
  extends:
    - .linux-job
    - .tarball-build-job
  parallel: !reference [.pkg-level-matrix, parallel]
  needs:
    - job: ci-scripts
    - job: lal
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalframe
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalmetaio
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalsimulation
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalburst
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalpulsar
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalinspiral
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalinference
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalapps
      parallel: !reference [.pkg-level-needs, parallel]
  variables:
    GIT_STRATEGY: none
    PACKAGE_ROOT_DIR: "${CI_PROJECT_DIR}/packages"
  script:
    # set builder environment
    - eval export "${LCI_ENV}"
    - echo "LCI_BLD=${LCI_BLD} LCI_PKG=${LCI_PKG:=${LCI_BLD}}"
    - source ${LCI_SCRIPTS}/init_${LCI_PKG}.sh
    # upgrade packages
    - source ${LCI_SCRIPTS}/pkg_upgrade_${LCI_BLD}.sh
    # check that packages have been upgraded
    - |
      echo "CI commit SHA: ${CI_COMMIT_SHA}"
      for pkg in ${LCI_PKGLIST}; do
          pkg_sha=$(${pkg}_version --verbose | grep -i "${pkg}-id" | cut -d ' ' -f2)
          echo "${pkg} commit SHA: ${pkg_sha}"
          if test "X${pkg_sha}" != "X${CI_COMMIT_SHA}"; then
              echo "ERROR: commit SHAs do not match"
              echo "ERROR: output from '${pkg}_version --verbose' is:"
              ${pkg}_version --verbose
              exit 1
          fi
      done
  rules:
    # do not runs if the job is not a plain make build
    - if: >-
        $LCI_ENV =~ /LCI_BLD=make/
      when: never
    - !reference [.pkg-level-job, rules]
