upgrade:
  stage: package-level
  image: "${LCI_DEV_IMG}:dev-${LCI_PLAT}${LCI_DEV_TAG_SUFFIX}"
  extends:
    - .linux-job
    - .tarball-build-job
  parallel: !reference [.pkg-level-matrix, parallel]
  needs:
    - job: ci-scripts
    - job: lal
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalframe
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalmetaio
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalsimulation
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalburst
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalpulsar
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalinspiral
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalinference
      parallel: !reference [.pkg-level-needs, parallel]
    - job: lalapps
      parallel: !reference [.pkg-level-needs, parallel]
  variables:
    GIT_STRATEGY: none
    PACKAGE_ROOT_DIR: "${CI_PROJECT_DIR}/packages"
  script:
    # set builder environment
    - eval export "${LCI_ENV}"
    - echo "LCI_BLD=${LCI_BLD} LCI_PKG=${LCI_PKG:=${LCI_BLD}}"
    - source ${LCI_SCRIPTS}/init_${LCI_PKG}.sh
    # upgrade packages
    - source ${LCI_SCRIPTS}/pkg_upgrade_${LCI_BLD}.sh
  rules:
    # do not runs if the job is not a plain make build
    - if: >
        $LCI_ENV =~ /LCI_BLD=make/
      when: never
    # do not run if only building packages for the LAL library
    - if: >
        $LCI_ENV =~ /LCL_LAL_ONLY=yes/
      when: never
    - !reference [.default-matrix-rule, rules]
