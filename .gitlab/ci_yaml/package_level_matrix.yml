# ----------------------------------------------------------------------
# LALSuite GitLab-CI: package-level build matrix
# ----------------------------------------------------------------------

.pkg-level-matrix:
  parallel:
    matrix:

      # --- Plain make -------------------------------------------------

      - LCI_PLAT: "el8"
        LCI_ENV: "LCI_BLD=make LCI_PKG=rpm"
        LCI_JOB_TYPE: ["push"]

      # --- RPM packages -----------------------------------------------

      - LCI_PLAT: "el8"
        LCI_ENV: "LCI_BLD=rpm"
        LCI_JOB_TYPE: ["merge", "sched-devimg", "sched-snapshot", "sched-release", "lalsuite-tag"]

      # --- Debian packages --------------------------------------------

      - LCI_PLAT: "bookworm"
        LCI_ENV: "LCI_BLD=deb"
        LCI_JOB_TYPE: ["merge", "sched-devimg", "sched-snapshot", "sched-release", "lalsuite-tag"]

      # --- CUDA (Ubuntu) packages -------------------------------------

      - LCI_PLAT: "cuda12.8"
        LCI_ENV: "LCI_BLD=deb LCI_CUDA=yes"
        LCI_JOB_TYPE: ["merge", "sched-devimg", "sched-snapshot", "sched-release", "lalsuite-tag"]

      # --- Conda packages ---------------------------------------------

      - LCI_PLAT: "conda-py314"
        LCI_ENV: "LCI_BLD=conda LCI_CONDA_PLAT_BASE=linux_64 LCI_CONDA_PLAT_lal=fft_implfftw LCI_CONDA_ABI=cp314"
        LCI_JOB_TYPE: ["merge", "sched-devimg"]

      - LCI_PLAT: "conda-py313"
        LCI_ENV: "LCI_BLD=conda LCI_CONDA_PLAT_BASE=linux_64 LCI_CONDA_PLAT_lal=fft_implfftw LCI_CONDA_ABI=cp313"
        LCI_JOB_TYPE: ["sched-devimg"]

      - LCI_PLAT: "conda-py312"
        LCI_ENV: "LCI_BLD=conda LCI_CONDA_PLAT_BASE=linux_64 LCI_CONDA_PLAT_lal=fft_implfftw LCI_CONDA_ABI=cpython"
        LCI_JOB_TYPE: ["sched-devimg"]

      - LCI_PLAT: "conda-py311"
        LCI_ENV: "LCI_BLD=conda LCI_CONDA_PLAT_BASE=linux_64 LCI_CONDA_PLAT_lal=fft_implfftw LCI_CONDA_ABI=cpython"
        LCI_JOB_TYPE: ["sched-devimg"]

      - LCI_PLAT: "conda-py310"
        LCI_ENV: "LCI_BLD=conda LCI_CONDA_PLAT_BASE=linux_64 LCI_CONDA_PLAT_lal=fft_implfftw LCI_CONDA_ABI=cpython"
        LCI_JOB_TYPE: ["sched-devimg"]
