# ----------------------------------------------------------------------
# LALSuite GitLab-CI: build Doxygen documentation
# ----------------------------------------------------------------------

doxygen-doc:
  stage: code-quality
  extends:
    - .generic-job
    - .linux-job
  variables:
    LCI_CONFIGURE_FLAGS_DOC: "--enable-doxygen"
  script:
    # install build dependencies
    - source ${LCI_SCRIPTS}/top_builddep_conda.sh
    # configure
    - ./00boot
    - source ${LCI_SCRIPTS}/build_env.sh
    - eval ./configure "${LCI_CONFIGURE_FLAGS}"
    # build and install documentation
    - make -j${CPU_COUNT} install-html
    - mv _inst/share/doc html
    # save outputs from Doxygen documentation filters
    - |
      for path in $(find -name '*.filtered'); do
          basedir=doxygen_filtered/$(dirname ${path} | sed 's|/doxygen/in/|/|')
          mkdir -p ${basedir}
          mv ${path} ${basedir}
      done
    # add required root index.html
    - |
      cat > html/index.html <<EOF
      <!DOCTYPE html>
      <html>
      <head><meta http-equiv="refresh" content="0; url='lalsuite/index.html'"/></head>
      </html>
      EOF
    # add redirect for primary documentation
    - |
      cat > html/_redirect <<EOF
      /lalsuite /lalsuite/dev
      EOF
    # export path prefix
    - echo "PATH_PREFIX=${LCI_DOC_PATH_PREFIX##lalsuite-v}" > path_prefix.env
  artifacts:
    expose_as: html
    paths:
      # documentation
      - html/
      # outputs from Doxygen documentation filters for debugging
      - doxygen_filtered/
    reports:
      dotenv: path_prefix.env
  rules:
    - if: >
        $LCI_PIPE_TYPE == "merge"
    - if: >
        $LCI_PIPE_TYPE == "sched-devimg"
    - if: >
        $LCI_PIPE_TYPE == "sched-doc"
    - if: >
        $LCI_PIPE_TYPE == "lalsuite-tag"

pages:
  pages:
    path_prefix: "${PATH_PREFIX}"
    expire_in: never
  extends:
    - .generic-job
    - .deploy-job
  needs:
    - doxygen-doc
  script:
    - mv html/ public/
  artifacts:
    paths:
      - public
  environment:
    name: "pages/${LCI_DOC_ENV_SUFFIX}"
    url: "${CI_PAGES_URL}"
  rules:
    - !reference [.deploy-check-execute, rules]
    - if: >
        $LCI_PIPE_TYPE == "sched-doc"
    - if: >
        $LCI_PIPE_TYPE == "lalsuite-tag"
