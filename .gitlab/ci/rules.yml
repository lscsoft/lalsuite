# ----------------------------------------------------------------------
# LALSuite: CI rules
#
# Rules for CI pipelines, and for skipping/including CI jobs.
# ----------------------------------------------------------------------

workflow:
  name: "$PIPELINE_NAME"
  rules:

    # --- CI nightly deployment build

    # runs if the trigger is a scheduled pipeline AND the branch is the main branch at lscsoft/lalsuite
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CI_PROJECT_PATH == "lscsoft/lalsuite" && $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH'
      when: always
      variables:
        PIPELINE_NAME: "Nightly build"
        PIPELINE_TYPE: nightly
        ENABLE_NIGHTLY: "--enable-nightly"
        EXECUTE_DEPLOY_ACTIONS: "yes"

    # runs if the trigger is a commit push AND the commit message contains the text "[ci nightly]"
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_MESSAGE =~ /\[ci nightly\]/'
      when: always
      variables:
        PIPELINE_NAME: "Push pipeline with nightly config"
        PIPELINE_TYPE: nightly
        ENABLE_NIGHTLY: "--enable-nightly"

    # --- CI build for "lalsuite" tags

    # - runs if the commit has been tagged AND the tag name begins with "lalsuite-v" AND the repository is lscsoft/lalsuite
    - if: '$CI_PROJECT_PATH == "lscsoft/lalsuite" && $CI_COMMIT_TAG =~ /^lalsuite-v/'
      when: always
      variables:
        PIPELINE_NAME: "LALSuite tag build"
        PIPELINE_TYPE: lalsuite-tag
        EXECUTE_DEPLOY_ACTIONS: "yes"

    # - runs if the trigger is a commit push AND the commit message contains the text "[ci tags]"
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_MESSAGE =~ /\[ci tags\]/'
      when: always
      variables:
        PIPELINE_NAME: "Push pipeline with LALSuite tag config"
        PIPELINE_TYPE: lalsuite-tag
        EXECUTE_DEPLOY_ACTIONS: "no"

    # --- CI build for merge requests

    # - runs if the trigger is opening a merge request AND the pipeline is a merged results pipeline
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_SHA != ""'
      when: always
      variables:
        PIPELINE_NAME: "MR pipeline ($CI_MERGE_REQUEST_IID)"
        PIPELINE_TYPE: merge-pre

    # - runs if the trigger is opening a merge request to lscsoft/lalsuite AND the pipeline is not a merged results pipeline
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_PROJECT_PATH  == "lscsoft/lalsuite" && $CI_MERGE_REQUEST_TARGET_BRANCH_SHA == ""'
      when: always
      variables:
        PIPELINE_NAME: "MR pipeline error"
        PIPELINE_TYPE: pipeline-error
        PIPELINE_ERROR_MESSAGE: |
          ------------------------------------------------------------------------\n
          This merge request cannot run the CI pipeline of the target repository  \n
          $CI_MERGE_REQUEST_PROJECT_URL                                           \n
          The most likely reason is you do not have Developer access permissions. \n
          Please request to be added as a Developer to this repository.           \n
          ------------------------------------------------------------------------\n

    # - runs if the trigger is a commit push AND the branch is the main branch at lscsoft/lalsuite
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_PROJECT_PATH == "lscsoft/lalsuite" && $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH'
      when: always
      variables:
        PIPELINE_NAME: "Push pipeline on $CI_PROJECT_PATH:$CI_COMMIT_REF_NAME"
        PIPELINE_TYPE: merge-post

    # - runs if the trigger is pipeline manually from the web interface
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
      variables:
        PIPELINE_NAME: "Manual web pipeline with MR config"
        PIPELINE_TYPE: merge

    # - runs if the trigger is a commit push AND the commit message contains the text "[ci full]"
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_MESSAGE =~ /\[ci full\]/'
      when: always
      variables:
        PIPELINE_NAME: "Push pipeline with MR config"
        PIPELINE_TYPE: merge

    # --- CI build for pushes

    # - runs if the trigger is a commit push AND there are no open merge requests for this branch
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "" && $CI_OPEN_MERGE_REQUESTS == null'
      when: always
      variables:
        PIPELINE_TYPE: push

    # --- otherwise do not run CI pipeline

    - when: never

# -- CI job for pipeline errors

pipeline-error:
  stage: pipeline error
  variables:
    GIT_STRATEGY: none
  script:
    - echo -e $PIPELINE_ERROR_MESSAGE
    - exit 1
  rules:
    - if: '$PIPELINE_TYPE == "pipeline-error"'

# -- rules to include CI jobs in CI pipelines

.ci-nightly-deploy:
  rules:
    - if: '$PIPELINE_TYPE == "nightly"'

.ci-nightly-deploy-always:
  rules:
    - if: '$PIPELINE_TYPE == "nightly"'
      when: always

.ci-lalsuite-tag-build:
  rules:
    - if: '$PIPELINE_TYPE == "lalsuite-tag"'

.ci-merge-build:
  rules:
    - if: '$PIPELINE_TYPE =~ /^merge/'

.ci-merge-pre-build-only:
  rules:
    - if: '$PIPELINE_TYPE == "merge-pre"'

.ci-merge-post-build-only:
  rules:
    - if: '$PIPELINE_TYPE == "merge-post"'

.ci-push-build:
  rules:
    - if: '$PIPELINE_TYPE == "push"'

# -- rules to include CI jobs using commit message or branch name

.ci-compiler:
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[ci compiler\]/ || $CI_COMMIT_REF_NAME =~ /[-_]ci[-_]compiler/'
      when: on_success

.ci-conda:
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[ci conda\]/ || $CI_COMMIT_REF_NAME =~ /[-_]ci[-_]conda/'
