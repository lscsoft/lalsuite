target-version = "py310"
extend-exclude = [
    "*.ipynb",
]

[lint]
select = [
    # isort errors
    "I",
    # pycodestyle errors
    "E9",
    "E101",
    "E701",
    "E702",
    "E703",
    "E711",
    # executable issues
    "EXE",
    # pyflakes
    "F401",
    "F404",
    "F631",
    "F632",
    # pycodestyle warnings
    "W2",
    "W605",
    # ruff
    "RUF016",
]

[lint.per-file-ignores]
"lalburst/bin/*" = ["E101"]
"lalburst/python/*" = ["E101"]
"lalburst/test/*" = ["E101"]

[lint.isort]
known-first-party = [
    "lalpulsar",
]
