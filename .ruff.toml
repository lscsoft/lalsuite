target-version = "py310"
extend-exclude = [
    "*.ipynb",
]

[lint]
select = [
    # isort errors
    "I",
    # pycodestyle errors
    "E9",
    "E711",
    # executable issues
    "EXE",
    # pyflakes
    "F401",
    "F631",
    "F632",
    # pycodestyle warnings
    "W2",
    "W605",
    # ruff
    "RUF016",
]
